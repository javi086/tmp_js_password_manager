<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Manager</title>

<!-- Tailwind CSS for styling -->
<script src="https://cdn.tailwindcss.com"></script>

</head>

<!-- Dark theme background -->
<body class="bg-zinc-900 text-white">

<!-- Main section -->
<section class="body-font">

<div class="container px-5 py-24 mx-auto flex flex-wrap items-center">

<!-- Left side (app description) -->
<div class="lg:w-3/5 md:w-1/2 md:pr-16">

<h1 class="title-font font-medium text-4xl text-white mb-4">
EasyPass
</h1>

<p class="leading-relaxed text-gray-300">
Securely store and manage your passwords with encrypted authentication and role-based access control.
</p>

</div>

<!-- Right side (login form) -->
<div class="lg:w-2/6 md:w-1/2 bg-zinc-800 rounded-lg p-8 flex flex-col md:ml-auto w-full mt-10 md:mt-0 border border-white shadow-lg">

<h2 class="text-white text-2xl font-medium title-font mb-5">
Login
</h2>

<!-- Login form -->
<form id="loginForm">

<!-- Email input -->
<div class="relative mb-4">
<label for="email" class="leading-7 text-sm text-gray-300">
Email
</label>

<input type="email" id="email" name="email"
class="w-full bg-zinc-900 rounded border border-white text-white py-2 px-3 focus:outline-none focus:border-red-500">
</div>

<!-- Password input -->
<div class="relative mb-4">
<label for="password" class="leading-7 text-sm text-gray-300">
Password
</label>

<input type="password" id="password" name="password"
class="w-full bg-zinc-900 rounded border border-white text-white py-2 px-3 focus:outline-none focus:border-red-500">
</div>

<!-- Show/hide password toggle -->
<div class="mb-4 text-sm text-gray-300">
<input type="checkbox" id="togglePassword">
<label for="togglePassword">Show Password</label>
</div>

<!-- Error or status message (shown by JS) -->
<p id="login-error" class="text-red-400 text-sm mb-3"></p>

<!-- Login button -->
<button
class="text-white bg-red-600 border-0 py-2 px-8 hover:bg-red-700 rounded text-lg w-full">
Login
</button>

</form>

<!-- Extra links -->
<div class="text-sm text-gray-400 mt-4 text-center">
<p>
<a href="#" class="hover:text-red-500">Forgot Password?</a>
</p>

<p>
Don't have an account?
<a href="register.html" class="hover:text-red-500">Register</a>
</p>
</div>

</div>

</div>

</section>

<!-- Footer -->
<footer class="text-center text-gray-400 text-sm pb-6">
<p>
<a href="#" class="hover:text-white mx-2">Contact</a>
<a href="#" class="hover:text-white mx-2">Support</a>
<a href="#" class="hover:text-white mx-2">Privacy</a>
<a href="#" class="hover:text-white mx-2">Terms</a>
</p>

<p class="mt-2">
Toronto, Canada
</p>

<p class="mt-1 text-gray-500">
© 2026 Password Manager
</p>
</footer>

<!-- Scripts loaded at the bottom -->
<!-- JWT utility (handles token + session) -->
<script src="../js/jwt-utils.js"></script>
<!-- Encryption utility (handles encryption/decryption) -->
<script src="../js/crypto-utils.js"></script>
<!-- Main authentication logic -->
<script src="../js/auth.js"></script>

</body>
</html>
