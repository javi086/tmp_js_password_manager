<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Password Manager</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-900 text-white">

<section class="body-font">

  <div class="container px-5 py-24 mx-auto">

    <!-- Title -->
    <div class="flex flex-col text-center w-full mb-12">
      <h1 class="sm:text-3xl text-2xl font-medium mb-4 text-white">
        Create Your Account
      </h1>

      <p class="lg:w-2/3 mx-auto text-gray-400">
        Register to securely store and manage your passwords.
      </p>
    </div>

    <!-- Form -->
    <form id="registerForm"
      class="flex lg:w-2/3 w-full flex-col mx-auto px-8 space-y-4 sm:px-0">

      <!-- Name -->
      <div class="relative w-full">
        <label class="text-sm text-gray-300">Full Name</label>
        <input type="text" id="name"
          class="w-full bg-zinc-800 rounded border border-white text-white py-2 px-3 focus:outline-none focus:border-red-500">
      </div>

      <!-- Email -->
      <div class="relative w-full">
        <label class="text-sm text-gray-300">Email</label>
        <input type="email" id="email"
          class="w-full bg-zinc-800 rounded border border-white text-white py-2 px-3 focus:outline-none focus:border-red-500">
      </div>

      <!-- Password -->
      <div class="relative w-full">
        <label class="text-sm text-gray-300">Password</label>
        <input type="password" id="password"
          class="w-full bg-zinc-800 rounded border border-white text-white py-2 px-3 focus:outline-none focus:border-red-500">
      </div>

      <!-- Confirm Password -->
      <div class="relative w-full">
        <label class="text-sm text-gray-300">Confirm Password</label>
        <input type="password" id="confirmPassword"
          class="w-full bg-zinc-800 rounded border border-white text-white py-2 px-3 focus:outline-none focus:border-red-500">
      </div>

      <!-- Message -->
      <p id="register-msg" class="text-sm text-center"></p>

      <!-- Button -->
      <button type="button"
        class="text-white bg-red-600 py-2 px-8 hover:bg-red-700 rounded text-lg">
        Register
      </button>

      <!-- Back to login -->
      <p class="text-center text-sm text-gray-400">
        Already have an account?
        <a href="login.html" class="text-red-500 hover:underline">Login</a>
      </p>

    </form>

  </div>

</section>

<script src="../js/register.js"></script>

</body>
</html>
